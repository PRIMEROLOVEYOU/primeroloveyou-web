    const reading = [
      { id: 'dedicatoria', tag: 'Apertura', title: 'Dedicatoria', text: `A la memoria de mi padre\nque me enseñó el valor del tiempo antes de que yo entendiera que podía perderlo.` },
      { id: 'prologo', tag: 'Prólogo', title: 'Prólogo', text: `«Echar de menos a alguien que no conoces es una forma de locura que no tiene diagnóstico».\n—CC\n\nHay ausencias que no dejan fotografías. No tienen fecha ni entierro. Y, sin embargo, pesan más que los muertos con nombre.\n\nDurante años pensé que lo que me dolía era el pasado. Me equivoqué. Lo que me dolía era algo que aún no había ocurrido.\n\nEl tiempo no es una línea recta. Eso lo dicen los físicos cuando quieren parecer valientes. El tiempo es un animal herido que siempre vuelve al lugar donde sangró.\n\nHay nombres que uno aprende a callar antes de que existan. Hay promesas que se rompen antes de ser dichas. Hay personas que reconoces la primera vez que las ves, no porque las hayas visto antes, sino porque las has estado esperando sin saberlo.\n\nA veces despierto con la sensación de haber perdido algo que nunca sostuve entre las manos. Un latido que no escuché. Una despedida que nadie pronunció.\n\nSi pudiera volver atrás, diría que todo empezó con un abrazo. Pero la verdad es que empezó mucho antes. Empezó el día que comprendí que el tiempo no siempre se pierde hacia adelante. A veces se pierde hacia alguien.\n\nEmpezó un lunes de febrero, con el café todavía humeando en la taza y un niño de ocho años mirándome desde una silla diminuta con los ojos que eran los míos.` },
      { id: 'cap1', tag: 'Capítulo 1', title: 'Todavía no ha pasado', text: `Hay exactamente dos momentos en la vida de todo hombre en los que el tiempo se detiene de verdad: cuando alguien te dice que vas a ser padre y cuando te lo reclama un niño al que nunca has visto. A mí me tocaron los dos el mismo día. Y ninguno era posible.\n\nLunes · 08:15 h · Calle La Unión · Málaga · 2026\n\nEl silencio en mi apartamento de la calle La Unión no era simple vacío. Era una entidad viva, pesada como el plomo fundido, instalada en cada rincón con la persistencia de un invitado no deseado. Se acurrucaba junto a mí en el sofá de cuero desgastado por el tiempo y las ausencias. Reclamaba el lado izquierdo de la cama, el lugar abandonado por mi ex hacía ocho meses tras dieciséis años de vida compartida.\n\nNuestra historia empezó en aquella primavera de 2010. Entonces creíamos tenerlo todo por delante; no imaginábamos que lo mejor de nosotros se quedaría tirado en la cuneta. Ahora, ese mutismo se adhería a las paredes blancas del salón como una niebla espesa, impregnada del humo fantasma de cigarrillos ya apagados.\n\nEran las ocho y cuarto de un lunes gris de febrero. Al otro lado de la cristalera, Málaga se desperezaba bajo una luz pálida y cortante: un sol incapaz de calentar los huesos, pero clavado en la piel como la hoja de un cuchillo afilado.\n\nLa cafetera italiana, reliquia de mis días más optimistas, emitió su gorgoteo final. El café brotó negro como la brea. Espeso. Amargo. Sin azúcar. El combustible necesario.\n\nA mis pies, Noa —mi pequeña pomerania negra de ojos brillantes— soltó un bufido impaciente. Su urgencia canina me recordaba que aún había vida en este lugar.\n\nMe serví el café en la taza desconchada, la última superviviente de aquel juego barato comprado en IKEA en una tarde de ilusiones, cuando el amor parecía eterno. Me quedé mirando a través del muro de vidrio, observando el mundo como un espectador distante.\n\nAbajo, la calle iniciaba su ritual diario: persianas metálicas ascendiendo con estrépito oxidado, peatones apresurados hacia Juan XXIII con maletines y mochilas al hombro y algún repartidor en patinete eléctrico zigzagueando entre ellos. Yo, con treinta y siete años a mis espaldas, me sentía un actor secundario relegado a la última fila de su propia existencia.\n\nIba a colocarle el arnés a Noa cuando el teléfono volvió a vibrar. Número fijo, prefijo de Málaga.\n\n—Buenos días, dígame.\n—Buenos días. ¿Es el señor Christian Herrmann?\n—Sí, soy yo.\n—Soy Silvia, la tutora de segundo de primaria en el CEIP García Lorca. Necesitamos que venga lo antes posible. Su hijo se ha alterado mucho y no pregunta más que por usted. Dice que no se calmará hasta que llegue su papá.\n\n—¿Mi… hijo? —balbuceé, sintiendo un vértigo repentino—. Debe de haber un error. No tengo hijos.\n\nEl mundo se detuvo en seco. Hubo murmullos al otro lado, un llanto amortiguado de fondo. La mujer regresó a la línea con tono suave, pero con una certeza que me inquietó.\n\n—El teléfono registrado es este, Christian. Y el niño insiste. Se llama como usted. Dice que es su “pequeño CC2”. ¿Podría venir, aunque sea para aclarar el malentendido? No deja de llorar.\n\nEl apodo que nadie más que los más íntimos usaban: CC. Sentí el corazón golpear contra las costillas como un martillo neumático.\n\n—Está bien —logré decir al fin—. Iré. Pero le aseguro que esto es un error garrafal.` },
      { id: 'cap2', tag: 'Capítulo 2', title: 'La grieta', text: `Salí del aula con el dibujo doblado en el bolsillo interior de la chupa, como si llevara una granada a punto de detonar. Cada crujido del papel contra el cuero era un recordatorio punzante de que esto no era un sueño febril inducido por el café amargo de la mañana.\n\nEl niño —ese supuesto hijo mío, con mis ojos y mi remolino en el pelo— se había quedado dentro con Silvia, su voz suave filtrándose a través de la puerta entreabierta mientras le hablaba bajito, calmándolo con palabras que sonaban como un arrullo maternal. Me invadió una envidia repentina y sorda.\n\nEl pasillo del García Lorca se extendía ante mí como un túnel de ecos olvidados: risas lejanas y amortiguadas del patio, el taconeo rítmico de mis botas sobre las baldosas desgastadas y el zumbido intermitente de un fluorescente agonizante en el techo. Todo me parecía irreal, como si hubiera irrumpido en una película independiente donde me habían asignado el papel principal sin guion.\n\nNecesitaba aire fresco, algo que disipara la opresión en mi pecho. Silvia me acompañó hasta la salida principal en Calle Alemania 14, sus pasos sincronizándose con los míos en un ritmo involuntario. Fuera, el sol de febrero pegaba con una suavidad engañosa.\n\n—Christian... —me llamó antes de que cruzara el umbral—. ¿De verdad no tienes idea de quién es?\n\nMe giré y la miré, realmente la miré por primera vez. Bajo la luz tenue del vestíbulo, sus ojos marrones brillaban con una chispa de curiosidad que trascendía el mero deber profesional.\n\n—No tengo hijos, Silvia. Te lo juro por lo que más quieras. Mi vida hasta hace media hora consistía en gestionar pedidos de zapatillas exclusivas, pasear a mi perra y evitar pensar demasiado en el vacío que me rodea. Mi última relación terminó hace ocho meses y lo último que esperaba hoy era que un clon en miniatura de mí mismo me llamara papá.\n\nElla asintió despacio, pero no retrocedió. Al contrario, dio un paso más cerca.\n\n—A veces los niños son canales para cosas que los adultos no comprendemos del todo. El niño no ha parado de repetir que “papá siempre viene cuando lo necesito”. Y ese dibujo... Christian, es que captura hasta el detalle de los cuellos subidos en tu chupa de cuero.\n\nSacó un post-it del bolsillo de sus jeans ajustados y garabateó algo con un bolígrafo azul. Se acercó un poco más para entregármelo, y esta vez el roce de sus dedos contra los míos fue deliberado.\n\n—Toma mi número personal. Por si el niño dice algo más una vez que se calme... o por si tú necesitas hablar con alguien que no te tome por loco.\n\nSalí a la calle con el sol calentando mi piel pero incapaz de disipar el calor diferente que subía desde el estómago. Caminé de vuelta mecánicamente, mitad obsesionada con el abrazo desesperado del niño; mitad atrapada en la forma en que Silvia había pronunciado mi nombre.\n\nCuando llegué al apartamento, Noa me recibió con ladridos alegres. Decidí sacarla a pasear para aclarar la cabeza. Caminamos hasta Huelin, hasta la playa, mientras el mar y el viento intentaban ordenar el ruido dentro de mí.\n\nDe vuelta en casa, desplegué el dibujo sobre la mesa. El hombre con chupa de cuero era yo, sin duda. El niño era un espejo perfecto de mí en la infancia. Debajo, con letras torpes: Papá. Detrás, esa dirección que me helaba la sangre.\n\nSaqué el móvil del bolsillo. El post-it de Silvia estaba allí. Mis dedos dudaron. No escribí. Aún no. Pero guardé el número en mis contactos, como si ese simple acto ya fuera un paso irreversible hacia lo desconocido.\n\nMálaga seguía bullendo a mi alrededor, pero yo estaba atrapado en un limbo: una Calle Peregrino que ya no me pertenecía, un número de teléfono que quemaba en la palma de mi mano, y el dibujo de un hijo imposible extendido sobre la mesa como una profecía.` },
      { id: 'cap3', tag: 'Capítulo 3', title: 'El código', text: `Me apoyé en la barandilla y dejé que el aire frío me golpeara la cara. El aislamiento del piso se me echaba encima como un bloque de hormigón. Tenía que hablar con alguien; no podía guardarme esto a solas.\n\nMarqué el número de mi madre. Vivía en Pedregalejo, en aquel piso con vistas al mar.\n\n—Hola, mamá… No, la verdad es que no. Ha pasado algo muy raro hoy. Un niño de segundo de primaria dice que soy su padre. Me abrazó, me llamó papá y conocía mi apodo, CC.\n\nAl otro lado, la línea quedó en suspenso.\n\n—Dios mío… ¿Y qué te dijo exactamente?\n—“Sabía que vendrías, papá”. Y luego: “Todavía no ha pasado”.\n\nMi madre tardó un segundo en responder.\n\n—Tu padre siempre decía eso ante cualquier problema: “Todavía no ha pasado”. Decía que, mientras no hubiera ocurrido del todo, todavía podíamos cambiar el final.\n\nNadie conocía aquello fuera de la familia. El escalofrío me recorrió entero.\n\nAbrí una caja antigua. Dentro estaba la camiseta de la selección española que mi padre me había regalado. Al desplegarla, un papel doblado y amarillento cayó al suelo.\n\nPara mi Christianito.\nEl futuro es una posibilidad.\nRecuerda: todavía no ha pasado.\n\nEl móvil vibró. Era Silvia. Me escribió que el niño preguntaba si yo iba a volver mañana y que había dicho algo extraño sobre una nota. Guardé el teléfono sin contestar todavía. No sabía qué parte de todo aquello me aterraba más: el niño, la nota, o la sensación de que alguien había previsto este momento mucho antes de que ocurriera.` },
      { id: 'cap4', tag: 'Capítulo 4', title: 'El pulso del pasado', text: `El tatuaje seguía picándome. Decidí llamar a Annette, mi tatuadora de Ikigaink Experience; la misma encargada de grabarlo años atrás. Contestó rápido.\n\n—Ven al estudio ahora mismo. No te entretengas. Aquí te espero.\n\nÁlex vino conmigo. En el estudio, el olor a tinta, desinfectante y un perfume demasiado conocido me envolvieron de golpe. Allí estaba también Iris. Ocho meses sin hablar y, sin embargo, todo seguía latiendo.\n\nAnnette me cogió el brazo con firmeza.\n\n—El diseño es el mismo —susurró—. El que hizo tu padre. Pero el pigmento… ha despertado.\n\nSacó un objeto pequeño y plateado. Cilíndrico. Del tamaño de un rotulador fino.\n\n—El catalizador. Si el tatuaje cambia a blanco, lo apoyas en el antebrazo. El mecanismo de disparo lo hace solo.\n\nNo entendía nada. Iris me miraba con los ojos azules clavados en el inyector, como si pudiera partirme la vida por la mitad.\n\nDespués me llevó en coche. En el portal nos quedamos suspendidos en una despedida que no era solo eso.\n\n—Sabes que te quiero más de lo que crees —me dijo al oído antes de irse.\n\nLa vi marcharse con la sensación de que el pasado seguía pidiendo su sitio. En el sofá, con Noa a mis pies, miré el techo durante horas. El tatuaje se había apagado. Pero la vibración seguía ahí, latente, bajo la piel.` },
      { id: 'cap5', tag: 'Capítulo 5', title: 'El puente al ayer', text: `El martes amaneció con cielo eléctrico sobre Málaga. Abrí el armario y, en vez de lo de siempre, me puse la réplica exacta de la cazadora roja de cuero de James Dean. Hoy tocaba rojo.\n\nEn el García Lorca, Silvia me esperaba con una taza de café entre las manos. Hoy no llevaba blusa formal. Camiseta negra, jeans negros, cazadora de cuero negra. El niño me miró y dijo: “Papá, hoy es el día. La moto del abuelo suena mejor que nunca”.\n\nLas luces empezaron a parpadear. El aula se deformó. Las paredes se tiñeron de sepia y neón. Afuera ya no se veía la calle de hoy: pasó un SEAT 124 rojo. Un grupo de chavales con chaquetas de cuero. Septiembre de 1986.\n\nVi a mi padre con dieciocho años. Vi a mi madre. Tropezaron en el pasillo del instituto. Los libros cayeron. Él la ayudó a recogerlos. Sus ojos se encontraron por primera vez.\n\nLuego todo cambió. Apareció el Bar Santa. Después yo, de bebé, en un carrito.\n\nCuando todo volvió a la normalidad, Silvia estaba pálida.\n\n—¿Has visto lo mismo que yo?\n—Sí. Mi padre. Mi madre. El origen.\n\nEl niño volvió a hablar con esa calma imposible: “Aún no. Déjalo. El abuelo dice que la paciencia es virtud de ganadores”.\n\nSalí del colegio con el brazo latiendo como metal recién sacado del fuego.` },
      { id: 'cap6', tag: 'Capítulo 6', title: 'En una hora', text: `Fui al GOfit Huelin. Nadar era mi meditación. Cuarenta minutos de brazadas no resuelven nada, pero ordenan el ruido.\n\nPensé en Silvia. En el niño. En mis padres besándose en el Bar Santa. Tenía que llamar a Iris.\n\nQuedamos en un café. Le conté todo: el colegio, el niño, el dibujo, la dirección de Peregrino, la nota de mi padre, el tatuaje, los flashbacks imposibles.\n\nEscuchó sin interrumpirme. Luego preguntó lo inevitable: \n\n—¿Estás enamorado de ella?\n\nIba a decir que no. Pero dentro de mi cabeza supe que era mentira.\n\n—No lo sé. Y eso me aterra. No debería ser posible; la he visto dos veces. Pero cerca de ella hay algo inexplicable.\n\nIris apoyó su mano sobre la mía.\n\n—No te pediré elecciones ahora mismo. Pero sé honesto contigo mismo antes de serlo con nadie más.\n\nAntes de irse, me miró con una ternura triste.\n\n—CC… Primero Love You.\n\nLuego llegaron mensajes de Silvia: el niño decía que la nota todavía no estaba entera y que ya faltaba menos. Dejé el café a medias y salí a la tarde de Málaga con el tatuaje pulsando bajo la piel.\n\nEl tiempo ya no parecía una línea. Parecía una puerta.` }

              <div className="space-y-8">{reading.map((item) => <ChapterBlock key={item.id} item={item} />)}</div>
            </section>

            <section id="resenas" className="border-y border-white/10 bg-white/[0.03]">

                <div className="grid lg:grid-cols-[0.85fr,1.15fr] gap-8 items-start">

                    <p className="mt-2 text-zinc-200">30 valoraciones globales</p>
                    <div className="mt-6 space-y-3 text-sm text-zinc-200">
                      <div className="flex items-center gap-3"><span className="w-16">5 estrellas</span><div className="flex-1 h-2 rounded-full bg-white/10 overflow-hidden"><div className="h-full w-[94%] bg-amber-300" /></div><span>94%</span></div>

                  <div className="grid md:grid-cols-2 gap-4">
                    {reviews.map((r, i) => (
                      <article key={i} className="rounded-[1.75rem] border border-white/10 bg-black/20 p-5">

                        <p className="mt-2 text-xs text-zinc-400">Reseñado en España el {r.date}</p>

                    ))}

                </div>

                <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-4">
                  {imaginedCharacters.map((item, i) => (
                    <button key={i} onClick={() => setLightbox(item)} className="group overflow-hidden rounded-[1.5rem] border border-white/10 bg-white/5">
                      <img src={item.src} alt={item.alt} className="h-56 w-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy" />
                    </button>
                  ))}
                </div>
              </div>
            </section>

            <section id="video" className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28">
              <SectionTitle eyebrow="Vídeo oficial" title="Short de YouTube integrado" text="La web ya muestra el vídeo real dentro de la página." />

                  <iframe
                    className="h-full w-full"
                    src="https://www.youtube.com/embed/ADlNpdwBY0o"
                    title="PRIMERO LOVE YOU — Short oficial"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerPolicy="strict-origin-when-cross-origin"
                    allowFullScreen
                  />
                </div>
              </div>
            </section>

            <section id="comprar" className="border-y border-white/10 bg-white/[0.03]">
              <div className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28 grid xl:grid-cols-[1.15fr,0.85fr] gap-8">
                <div>
                  <SectionTitle eyebrow="Dónde comprar" title="Compra online o físicamente en Málaga" text="Una salida comercial clara para Amazon y para compra física en Librerías Proteo Prometeo." />
                  <div className="flex flex-col sm:flex-row gap-3">
                    <a href="https://www.amazon.es/dp/B0H12QX4HW" target="_blank" rel="noreferrer" className="inline-flex items-center justify-center gap-2 rounded-full bg-amber-300 px-6 py-3 font-semibold text-black hover:bg-amber-200 transition-colors"><ShoppingCart className="w-4 h-4" /> Comprar en Amazon</a>
                    <a href="tel:+34952219019" className="inline-flex items-center justify-center gap-2 rounded-full border border-white/15 bg-white/8 px-6 py-3 font-semibold text-white hover:bg-white/14 transition-colors"><Phone className="w-4 h-4" /> Llamar a Proteo Prometeo</a>
                  </div>
                </div>
                <div className="rounded-[2rem] border border-white/10 bg-gradient-to-b from-white/6 to-white/[0.03] p-6 md:p-8">

                  <h3 className="mt-4 text-2xl font-semibold text-white">Librerías Proteo Prometeo</h3>
                  <div className="mt-6 space-y-4 text-zinc-300 text-sm leading-7">
                    <p><strong className="text-white">Dirección:</strong> C. Prta Buenaventura, 3, Distrito Centro, 29008 Málaga</p>
                    <p><strong className="text-white">Teléfono:</strong> 952 21 90 19</p>
                    <p><strong className="text-white">Edición en librería:</strong> ISBN 979-8-19-593997-7 · PVP 18,99 €</p>
                  </div>
                </div>
              </div>
            </section>

            <section id="contacto" className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28">
              <SectionTitle eyebrow="Contacto y redes" title="Sigue el proyecto en redes" text="Canales oficiales del libro para novedades, vídeos, comunidad y contacto directo." />
              <div className="grid gap-6">
                <div className="rounded-[2rem] border border-white/10 bg-white/5 p-6 md:p-8">
                  <p className="text-xl font-semibold text-white">Christian C. D'Rosoy</p>
                  <p className="mt-3 text-zinc-300">Correo directo para prensa, presentaciones, colaboraciones y contacto.</p>
                  <div className="mt-6 flex flex-wrap gap-3">
                    <a href="mailto:christiancdrosoy@hotmail.com" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8"><Mail className="w-4 h-4" /> christiancdrosoy@hotmail.com</a>
                    <a href="https://www.instagram.com/primeroloveyou_libro?igsh=YTJhOWJ6M2Fkc2Ru&utm_source=qr" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-white/10 px-4 py-2 text-sm text-zinc-200 hover:bg-white/8"><Instagram className="w-4 h-4" /> Instagram</a>
                    <a href="https://www.facebook.com/share/g/163orYLTEDm/?mibextid=wwXIfr" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-white/10 px-4 py-2 text-sm text-zinc-200 hover:bg-white/8"><Facebook className="w-4 h-4" /> Facebook</a>
                    <a href="https://www.tiktok.com/@primeroloveyou_libro?_r=1&_t=ZN-97yLDwzYbXn" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-white/10 px-4 py-2 text-sm text-zinc-200 hover:bg-white/8"><Film className="w-4 h-4" /> TikTok</a>
                    <a href="https://www.youtube.com/shorts/ADlNpdwBY0o" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-white/10 px-4 py-2 text-sm text-zinc-200 hover:bg-white/8"><Youtube className="w-4 h-4" /> YouTube</a>
                  </div>
                </div>
              </div>
            </section>
          </main>

          <footer className="border-t border-white/10 bg-black/20">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-8 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
              <div>
                <p className="font-semibold text-white">© {year} Christian C. D'Rosoy</p>
                <p className="text-sm text-zinc-400 mt-1">PRIMERO LOVE YOU · Libro I · Trilogía oficial</p>
              </div>
              <a href="#inicio" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8 transition-colors">Volver arriba <ChevronRight className="w-4 h-4" /></a>
            </div>
          </footer>

          {lightbox && (
            <div className="fixed inset-0 z-[100] bg-black/88 backdrop-blur-sm p-4 flex items-center justify-center" onClick={() => setLightbox(null)}>
              <div className="relative max-w-5xl w-full">
                <button className="absolute -top-12 right-0 w-10 h-10 rounded-full bg-white/10 border border-white/15 flex items-center justify-center" onClick={() => setLightbox(null)}><X className="w-5 h-5 text-white" /></button>
                <img src={lightbox.src} alt={lightbox.alt} className="w-full max-h-[82vh] object-contain rounded-2xl border border-white/10" />
                <p className="mt-4 text-center text-zinc-300">{lightbox.alt}</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
