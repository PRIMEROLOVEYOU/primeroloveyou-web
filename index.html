          <section id="contacto" className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28"><SectionTitle eyebrow="Contacto y redes" title="Contacto" text="" /><div className="max-w-4xl"><div className="rounded-[2rem] border border-white/10 bg-white/5 p-6 md:p-8"><p className="text-xl font-semibold text-white">Christian C. D'Rosoy</p><p className="mt-3 text-zinc-300">Correo, presentaciones, prensa y colaboraciones.</p><a href="mailto:christiancdrosoy@hotmail.com" className="mt-4 inline-flex items-center gap-2 text-amber-200 hover:text-amber-100 transition-colors"><Mail className="w-4 h-4" /> christiancdrosoy@hotmail.com</a><div className="mt-6 flex flex-wrap gap-3"><a href="mailto:christiancdrosoy@hotmail.com" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8"><Mail className="w-4 h-4" /> Correo</a><a href="https://www.instagram.com/primeroloveyou_libro?igsh=YTJhOWJ6M2Fkc2Ru&utm_source=qr" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-pink-400/30 bg-pink-400/10 px-4 py-2 text-sm text-pink-100 hover:bg-pink-400/15"><Instagram className="w-4 h-4" /> Instagram</a><a href="https://www.facebook.com/share/g/163orYLTEDm/?mibextid=wwXIfr" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-blue-400/30 bg-blue-400/10 px-4 py-2 text-sm text-blue-100 hover:bg-blue-400/15"><Facebook className="w-4 h-4" /> Facebook</a><a href="https://www.tiktok.com/@primeroloveyou_libro?_r=1&_t=ZN-97yLDwzYbXn" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-white/15 bg-white/8 px-4 py-2 text-sm text-white hover:bg-white/14"><Sparkles className="w-4 h-4" /> TikTok</a><a href="https://youtube.com/shorts/ADlNpdwBY0o" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-red-400/30 bg-red-400/10 px-4 py-2 text-sm text-red-100 hover:bg-red-400/15"><Youtube className="w-4 h-4" /> YouTube</a></div></div></div></section>
        </main>
        <footer className="border-t border-white/10 bg-black/20"><div className="max-w-7xl mx-auto px-4 md:px-6 py-8 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between"><div><p className="font-semibold text-white">© {year} Christian C. D'Rosoy</p><p className="text-sm text-zinc-400 mt-1">PRIMERO LOVE YOU · Libro I · Trilogía oficial</p></div><a href="#inicio" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8 transition-colors">Volver arriba <ChevronRight className="w-4 h-4" /></a></div></footer>
        {lightbox && <div className="fixed inset-0 z-[100] bg-black/88 backdrop-blur-sm p-4 flex items-center justify-center" onClick={() => setLightbox(null)}><div className="relative max-w-5xl w-full"><button className="absolute -top-12 right-0 w-10 h-10 rounded-full bg-white/10 border border-white/15 flex items-center justify-center" onClick={() => setLightbox(null)}><X className="w-5 h-5 text-white" /></button><img src={lightbox.src} alt={lightbox.alt} className="w-full max-h-[82vh] object-contain rounded-2xl border border-white/10" /><p className="mt-4 text-center text-zinc-300">{lightbox.alt}</p></div></div>}
      </div>;
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
