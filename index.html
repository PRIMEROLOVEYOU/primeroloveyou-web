                          <p className="text-center italic">A la memoria de mi padre,</p>

                        </>

                      {tab === 'prologo' && (

                          <p>«Echar de menos a alguien que no conoces es una forma de locura que no tiene diagnóstico». —CC</p>
                          <p>Hay ausencias que no dejan fotografías. No tienen fecha ni entierro. Y, sin embargo, pesan más que los muertos con nombre.</p>
                          <p>Durante años pensé que lo que me dolía era el pasado. Me equivoqué. Lo que me dolía era algo que aún no había ocurrido.</p>
                        </>
                      )}
                      {tab === 'cap1' && (
                        <>
                          <p>Hay exactamente dos momentos en la vida de todo hombre en los que el tiempo se detiene de verdad: cuando alguien te dice que vas a ser padre y cuando te lo reclama un niño al que nunca has visto.</p>
                          <p>El silencio en mi apartamento de la calle La Unión no era simple vacío. Era una entidad viva, pesada como el plomo fundido, instalada en cada rincón con la persistencia de un invitado no deseado.</p>
                          <p>Al otro lado de la cristalera, Málaga se desperezaba bajo una luz pálida y cortante. La cafetera italiana, reliquia de mis días más optimistas, emitió su gorgoteo final. El café brotó negro como la brea. Espeso. Amargo. Sin azúcar.</p>
                        </>
                      )}
                      {tab === 'cap2' && (
                        <>
                          <p>Bajé las escaleras con el dibujo doblado en el bolsillo interior de la chaqueta de piel: una granada a punto de detonar. Cada crujido del papel contra el cuero era un recordatorio punzante: aquello no había salido de mi cabeza.</p>
                          <p>Silvia me miró con una calma inesperada. —A veces los niños son canales para cosas ajenas a la comprensión adulta —dijo con una sonrisa suave—. No ha parado de repetir que “papá siempre viene cuando lo necesito”.</p>
                        </>
                      )}
                      {tab === 'cap3' && (

                          <p>—No, la verdad es que no. Ha pasado algo muy raro hoy. Un niño de segundo de primaria dice que soy su padre, me llamó papá y conocía mi apodo, CC.</p>
                          <p>Al abrir la caja, el olor a naftalina inundó la habitación, mezclado con algo más: madera vieja, cuero y el rastro fantasma de la colonia de mi padre.</p>
                        </>
                      )}
                      {tab === 'cap4' && (

                          <p>—El diseño es el mismo —susurró—. El que hizo tu padre.</p>
                          <p>—Hay cosas que no se explican antes de tiempo —recordé en voz baja—. Se activan cuando toca.</p>
                        </>
