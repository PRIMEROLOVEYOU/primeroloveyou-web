                      [MapPin, 'Málaga', 'Una atmósfera real, cercana y profundamente evocadora.']
                    ].map(([Icon, t, d]) => (
                      <div key={t} className="rounded-3xl border border-white/10 bg-black/20 p-5">
                        <Icon className="w-5 h-5 text-amber-300 mb-3" />
                        <p className="font-semibold text-white">{t}</p>
                        <p className="mt-2 text-sm text-zinc-300">{d}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>

            <section id="leer" className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28">
              <SectionTitle eyebrow="Leer gratis" title="Dedicatoria, prólogo y capítulos reales" text="Aquí sí está el contenido real de lectura gratuita: dedicatoria, prólogo y capítulos 1 al 6, presentados con lectura cómoda para móvil y escritorio." />
              <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-5 mb-10">
                {reading.map((item) => (
                  <a key={item.id} href={`#${item.id}`} className="rounded-[1.75rem] border border-white/10 bg-gradient-to-br from-white/7 to-white/[0.03] p-6 hover:border-amber-300/30 transition-colors">
                    <div className="flex items-center justify-between">
                      <span className="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/6 px-3 py-1 text-xs uppercase tracking-[0.25em] text-zinc-300">{item.tag}</span>
                      <BookMarked className="w-4 h-4 text-amber-300" />
                    </div>
                    <h3 className="mt-5 text-2xl font-semibold text-white">{item.title}</h3>
                    <p className="mt-3 text-zinc-300 leading-relaxed">Pulsa para leer.</p>
                  </a>
                ))}
              </div>
              <div className="space-y-8">
                {reading.map((item) => <ChapterBlock key={item.id} item={item} />)}
              </div>
            </section>

            <section id="galeria" className="border-y border-white/10 bg-white/[0.03]">
              <div className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28">
                <SectionTitle eyebrow="Galería" title="Fotos reales de la presentación" text="Aquí están visibles las imágenes de la presentación del libro, con ampliación al pulsar." />
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5">
                  {gallery.map((item, i) => (
                    <button key={i} onClick={() => setLightbox(item)} className="group relative overflow-hidden rounded-[1.75rem] border border-white/10 bg-white/5 text-left">
                      <img src={item.src} alt={item.alt} className="h-56 md:h-72 w-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy" />
                      <div className="absolute inset-0 bg-gradient-to-t from-black/55 via-transparent to-transparent" />
                      <div className="absolute left-4 right-4 bottom-4 flex items-center justify-between gap-3">
                        <span className="text-sm text-white font-medium">{item.alt}</span>
                        <Camera className="w-4 h-4 text-amber-200 shrink-0" />
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            </section>

            <section id="video" className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28">
              <SectionTitle eyebrow="Vídeo" title="Espacio preparado para booktrailer o presentación" text="La web ya queda lista para añadir un vídeo de YouTube, reel, teaser o presentación cuando quieras." />
              <div className="rounded-[2rem] border border-dashed border-white/20 bg-gradient-to-br from-white/5 to-white/[0.02] p-8 md:p-14 text-center">
                <PlayCircle className="w-16 h-16 text-amber-300 mx-auto" />
                <h3 className="mt-5 text-2xl md:text-3xl font-semibold text-white">Aquí irá el vídeo</h3>
                <p className="mt-3 text-zinc-300 max-w-2xl mx-auto">Booktrailer, presentación, entrevista o vídeo promocional. Este bloque se sustituye fácilmente cuando tengas la URL final.</p>
              </div>
            </section>

            <section id="comprar" className="border-y border-white/10 bg-white/[0.03]">
              <div className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28 grid xl:grid-cols-[1.15fr,0.85fr] gap-8">
                <div>
                  <SectionTitle eyebrow="Dónde comprar" title="Compra el libro o consulta reseñas" text="Salida comercial directa, elegante y clara para Amazon y para la disponibilidad en Málaga." />
                  <div className="flex flex-col sm:flex-row gap-3">
                    <a href="https://www.amazon.es/dp/B0H12QX4HW" target="_blank" rel="noreferrer" className="inline-flex items-center justify-center gap-2 rounded-full bg-amber-300 px-6 py-3 font-semibold text-black hover:bg-amber-200 transition-colors">
                      <ShoppingCart className="w-4 h-4" /> Comprar ahora
                    </a>
                    <a href="https://www.amazon.es/dp/B0H12QX4HW" target="_blank" rel="noreferrer" className="inline-flex items-center justify-center gap-2 rounded-full border border-white/15 bg-white/8 px-6 py-3 font-semibold text-white hover:bg-white/14 transition-colors">
                      <Star className="w-4 h-4" /> Ver ficha y reseñas
                    </a>
                  </div>
                  <div className="mt-8 grid sm:grid-cols-3 gap-4">
                    {[
                      'Acceso directo al libro en Amazon desde la web oficial.',
                      'Zona lista para destacar reseñas reales cuando quieras añadirlas.',
                      'Diseño enfocado a conversión y lectura desde móvil.'
                    ].map((item) => (
                      <div key={item} className="rounded-3xl border border-white/10 bg-black/20 p-5 text-sm text-zinc-300 leading-relaxed">{item}</div>
                    ))}
                  </div>
                </div>
                <div className="rounded-[2rem] border border-white/10 bg-gradient-to-b from-white/6 to-white/[0.03] p-6 md:p-8">
                  <p className="text-[11px] uppercase tracking-[0.35em] text-amber-300/80">También disponible en Málaga</p>
                  <h3 className="mt-4 text-2xl font-semibold text-white">Librerías Proteo y Prometeo</h3>
                  <div className="mt-6 space-y-4">
                    <div className="rounded-2xl border border-white/10 bg-white/5 p-4">
                      <p className="font-semibold text-white">Librería Proteo</p>
                      <p className="text-sm text-zinc-300 mt-1">Consulta disponibilidad en tienda · ISBN 979-8-19-593997-7 · PVP 18,99 €</p>
                    </div>
                    <div className="rounded-2xl border border-white/10 bg-white/5 p-4">
                      <p className="font-semibold text-white">Librería Prometeo</p>
                      <p className="text-sm text-zinc-300 mt-1">Consulta disponibilidad en tienda en Málaga.</p>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section id="contacto" className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28">
              <SectionTitle eyebrow="Contacto y redes" title="La web queda lista para crecer" text="Queda preparada para añadir tus redes, el vídeo real, prensa, newsletter o próximos libros sin perder velocidad ni estilo." />
              <div className="grid lg:grid-cols-2 gap-6">
                <div className="rounded-[2rem] border border-white/10 bg-white/5 p-6 md:p-8">
                  <p className="text-xl font-semibold text-white">Christian C. D'Rosoy</p>
                  <p className="mt-3 text-zinc-300">Espacio preparado para correo, presentaciones, prensa y colaboraciones.</p>
                  <div className="mt-6 flex flex-wrap gap-3">
                    <a href="mailto:" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8"><Mail className="w-4 h-4" /> Correo</a>
                    <span className="inline-flex items-center gap-2 rounded-full border border-white/10 px-4 py-2 text-sm text-zinc-400"><Instagram className="w-4 h-4" /> Instagram</span>
                    <span className="inline-flex items-center gap-2 rounded-full border border-white/10 px-4 py-2 text-sm text-zinc-400"><Facebook className="w-4 h-4" /> Facebook</span>
                    <span className="inline-flex items-center gap-2 rounded-full border border-white/10 px-4 py-2 text-sm text-zinc-400"><Youtube className="w-4 h-4" /> YouTube</span>
                  </div>
                </div>
                <div className="rounded-[2rem] border border-amber-300/20 bg-amber-300/8 p-6 md:p-8">
                  <p className="text-xl font-semibold text-white">Qué incorpora esta versión</p>
                  <ul className="mt-5 space-y-3 text-sm md:text-base text-amber-50/90">
                    <li>• Aspecto cinematográfico y fondo animado elegante.</li>
                    <li>• Fotos visibles de la presentación y autor.</li>
                    <li>• Dedicatoria, prólogo y capítulos 1 al 6 reales.</li>
                    <li>• Amazon, Málaga, reseñas y huecos para vídeo/redes.</li>
                  </ul>
                </div>
              </div>
            </section>
          </main>

          <footer className="border-t border-white/10 bg-black/20">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-8 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
              <div>
                <p className="font-semibold text-white">© {year} Christian C. D'Rosoy</p>
                <p className="text-sm text-zinc-400 mt-1">PRIMERO LOVE YOU · Libro I · Trilogía oficial</p>
              </div>
              <a href="#inicio" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8 transition-colors">
                Volver arriba <ChevronRight className="w-4 h-4" />
              </a>
            </div>
          </footer>

          {lightbox && (
            <div className="fixed inset-0 z-[100] bg-black/88 backdrop-blur-sm p-4 flex items-center justify-center" onClick={() => setLightbox(null)}>
              <div className="relative max-w-5xl w-full">
                <button className="absolute -top-12 right-0 w-10 h-10 rounded-full bg-white/10 border border-white/15 flex items-center justify-center" onClick={() => setLightbox(null)}>
                  <X className="w-5 h-5 text-white" />
                </button>
                <img src={lightbox.src} alt={lightbox.alt} className="w-full max-h-[82vh] object-contain rounded-2xl border border-white/10" />
                <p className="mt-4 text-center text-zinc-300">{lightbox.alt}</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
