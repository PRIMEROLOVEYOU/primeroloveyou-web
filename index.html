                  <p className="text-xl font-semibold text-white">Qué hace profesional a esta versión</p>
                  <ul className="mt-5 space-y-3 text-sm md:text-base text-amber-50/90">
                    <li>• Aspecto cinematográfico y fondo animado sin sacrificar velocidad.</li>
                    <li>• Jerarquía visual clara y excelente lectura en móvil.</li>
                    <li>• Secciones listas para SEO, compra, galería, vídeo y redes.</li>
                    <li>• Diseño exclusivo con acabado premium y editorial.</li>
                  </ul>
                </div>
              </div>
            </section>
          </main>

          <footer className="border-t border-white/10 bg-black/20">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-8 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
              <div>
                <p className="font-semibold text-white">© {year} Christian C. D'Rosoy</p>
                <p className="text-sm text-zinc-400 mt-1">PRIMERO LOVE YOU · Libro I · Trilogía oficial</p>
              </div>
              <a href="#inicio" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8 transition-colors">
                Volver arriba <ChevronRight className="w-4 h-4" />
              </a>
            </div>
          </footer>

          {lightbox && (
            <div className="fixed inset-0 z-[100] bg-black/88 backdrop-blur-sm p-4 flex items-center justify-center" onClick={() => setLightbox(null)}>
              <div className="relative max-w-5xl w-full">
                <button className="absolute -top-12 right-0 w-10 h-10 rounded-full bg-white/10 border border-white/15 flex items-center justify-center" onClick={() => setLightbox(null)}>
                  <X className="w-5 h-5 text-white" />
                </button>
                <img src={lightbox.src} alt={lightbox.alt} className="w-full max-h-[82vh] object-contain rounded-2xl border border-white/10" />
                <p className="mt-4 text-center text-zinc-300">{lightbox.alt}</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
