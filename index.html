                  <div className="mx-auto max-w-2xl rounded-[1.75rem] border border-white/8 bg-white p-7 text-neutral-900 md:p-10">
                    <div className="text-xs font-semibold uppercase tracking-[0.24em] text-neutral-500">Lectura gratuita</div>
                    <h4 className="mt-3 text-3xl font-semibold tracking-tight text-neutral-950">{selectedChapter.title}</h4>
                    <p className="mt-6 text-lg leading-9 text-neutral-700">{selectedChapter.content}</p>
                    <div className="mt-8 rounded-2xl bg-neutral-100 p-5 text-sm leading-7 text-neutral-600">
                      Consejo editorial: cuando pegues aquí el capítulo real, puedes cerrar el texto con una llamada clara a la acción para continuar la lectura completa del libro.
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
