      <section id="leer" className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28"><SectionTitle eyebrow="Leer gratis" title="Dedicatoria, prólogo y capítulos de muestra" text="Formato editorial, lectura limpia y cómoda en móvil y escritorio." /><div className="grid md:grid-cols-2 xl:grid-cols-4 gap-5 mb-10">{reading.map(item => <a key={item.id} href={`#${item.id}`} className="rounded-[1.75rem] border border-white/10 bg-gradient-to-br from-white/7 to-white/[0.03] p-6 hover:border-amber-300/30 transition-colors"><div className="flex items-center justify-between"><span className="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/6 px-3 py-1 text-xs uppercase tracking-[0.25em] text-zinc-300">{item.tag}</span><BookMarked className="w-4 h-4 text-amber-300" /></div><h3 className="mt-5 text-2xl font-semibold text-white">{item.title}</h3><p className="mt-3 text-zinc-300 leading-relaxed">Pulsa para leer.</p></a>)}</div><div className="space-y-8">{reading.map(item => <ChapterBlock key={item.id} item={item} />)}</div></section>
      <section id="galeria" className="border-y border-white/10 bg-white/[0.03]"><div className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28"><SectionTitle eyebrow="Galería" title="Presentación del libro" text="Fotos reales del evento con ampliación al pulsar." /><CardGrid items={gallery} /></div></section>
      <section id="personajes" className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28"><SectionTitle eyebrow="Personajes imaginados" title="Así podría verse el universo humano de la novela" text="Versión ligera y estable para GitHub, con imágenes locales limpias." /><CardGrid items={personajes} /></section>
      <section id="video" className="border-y border-white/10 bg-white/[0.03]"><div className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28"><SectionTitle eyebrow="Vídeo" title="Booktrailer / presentación" text="Vídeo embebido en formato ligero y compatible." /><div className="rounded-[2rem] overflow-hidden border border-white/10 bg-black/30 shadow-2xl shadow-black/30"><div className="aspect-[9/16] md:aspect-video w-full"><iframe className="w-full h-full" src={youtubeEmbed} title="Vídeo PRIMERO LOVE YOU" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerPolicy="strict-origin-when-cross-origin" allowFullScreen /></div></div></div></section>
      <section id="comprar" className="max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28"><div className="grid xl:grid-cols-[1.1fr,0.9fr] gap-8"><div><SectionTitle eyebrow="Reseñas" title="Opiniones de lectores" text="Reseñas destacadas dentro de la propia web." /><div className="grid md:grid-cols-2 gap-4">{reviews.map((r,i) => <div key={i} className="rounded-3xl border border-white/10 bg-white/5 p-5"><p className="text-amber-300 text-sm font-semibold">{r.name}</p><p className="mt-2 font-semibold text-white">{r.title}</p><p className="mt-3 text-sm text-zinc-300 leading-relaxed">{r.text}</p></div>)}</div><div className="mt-6 flex flex-col sm:flex-row gap-3"><a href="https://www.amazon.es/dp/B0H12QX4HW" target="_blank" rel="noreferrer" className="inline-flex items-center justify-center gap-2 rounded-full bg-amber-300 px-6 py-3 font-semibold text-black hover:bg-amber-200 transition-colors"><ShoppingCart className="w-4 h-4" /> Comprar ahora</a><a href="https://www.amazon.es/dp/B0H12QX4HW" target="_blank" rel="noreferrer" className="inline-flex items-center justify-center gap-2 rounded-full border border-white/15 bg-white/8 px-6 py-3 font-semibold text-white hover:bg-white/14 transition-colors"><Star className="w-4 h-4" /> Ver más reseñas</a></div></div><div className="rounded-[2rem] border border-white/10 bg-gradient-to-b from-white/6 to-white/[0.03] p-6 md:p-8"><p className="text-[11px] uppercase tracking-[0.35em] text-amber-300/80">También disponible en Málaga</p><h3 className="mt-4 text-2xl font-semibold text-white">Librerías Proteo Prometeo</h3><div className="mt-6 space-y-4"><div className="rounded-2xl border border-white/10 bg-white/5 p-4"><p className="font-semibold text-white">Compra física en Málaga</p><p className="text-sm text-zinc-300 mt-1">C. Prta Buenaventura, 3, Distrito Centro, 29008 Málaga</p><p className="text-sm text-zinc-300 mt-1">Teléfono: 952 21 90 19</p></div></div><div className="mt-5 flex flex-wrap gap-3"><a href="tel:+34952219019" className="inline-flex items-center justify-center gap-2 rounded-full bg-amber-300 px-5 py-3 font-semibold text-black hover:bg-amber-200 transition-colors">Llamar</a><a href="https://www.google.com/maps/search/?api=1&query=C.+Prta+Buenaventura,+3,+Distrito+Centro,+29008+Málaga" target="_blank" rel="noreferrer" className="inline-flex items-center justify-center gap-2 rounded-full border border-white/15 bg-white/8 px-5 py-3 font-semibold text-white hover:bg-white/14 transition-colors">Cómo llegar</a></div></div></div></section>
      <section id="contacto" className="border-t border-white/10 bg-black/20"><div className="max-w-7xl mx-auto px-4 md:px-6 py-14"><SectionTitle eyebrow="Contacto y redes" title="Christian C. D'Rosoy" text="Correo y redes sociales oficiales del proyecto." /><div className="flex flex-wrap gap-3"><a href={socialLinks.email} className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8"><Mail className="w-4 h-4" /> Correo</a><a href={socialLinks.instagram} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8"><Instagram className="w-4 h-4" /> Instagram</a><a href={socialLinks.facebook} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8"><Facebook className="w-4 h-4" /> Facebook</a><a href={socialLinks.tiktok} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8"><Film className="w-4 h-4" /> TikTok</a><a href={youtubeEmbed.replace('/embed/','/shorts/')} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8"><Youtube className="w-4 h-4" /> YouTube</a></div><div className="mt-10 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between"><div><p className="font-semibold text-white">© {year} Christian C. D'Rosoy</p><p className="text-sm text-zinc-400 mt-1">PRIMERO LOVE YOU · Libro I · Trilogía oficial</p></div><a href="#inicio" className="inline-flex items-center gap-2 rounded-full border border-white/15 px-4 py-2 text-sm text-white hover:bg-white/8 transition-colors">Volver arriba <ChevronRight className="w-4 h-4" /></a></div></div></section></main></div>;
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
