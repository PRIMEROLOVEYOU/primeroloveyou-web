    const synopsis = '¿Qué harías si un niño apareciera en tu vida asegurando ser tu hijo… y lo más aterrador fuera descubrir que dice la verdad? PRIMERO LOVE YOU abre una historia donde el amor, el tiempo y lo imposible se miran de frente.';

    const reading = [
      { id: 'dedicatoria', tag: 'Apertura', title: 'Dedicatoria', text: `A la memoria de mi padre\nque me enseñó el valor del tiempo antes de que yo entendiera que podía perderlo.` },
      { id: 'prologo', tag: 'Prólogo', title: 'Prólogo', text: `«Echar de menos a alguien que no conoces es una forma de locura que no tiene diagnóstico».\n—CC\n\nHay ausencias que no dejan fotografías. No tienen fecha ni entierro. Y, sin embargo, pesan más que los muertos con nombre.\n\nDurante años pensé que lo que me dolía era el pasado. Me equivoqué. Lo que me dolía era algo que aún no había ocurrido.\n\nEl tiempo no es una línea recta. Eso lo dicen los físicos cuando quieren parecer valientes. El tiempo es un animal herido que siempre vuelve al lugar donde sangró.\n\nHay nombres que uno aprende a callar antes de que existan. Hay promesas que se rompen antes de ser dichas. Hay personas que reconoces la primera vez que las ves, no porque las hayas visto antes, sino porque las has estado esperando sin saberlo.\n\nA veces despierto con la sensación de haber perdido algo que nunca sostuve entre las manos. Un latido que no escuché. Una despedida que nadie pronunció.\n\nSi pudiera volver atrás, diría que todo empezó con un abrazo. Pero la verdad es que empezó mucho antes. Empezó el día que comprendí que el tiempo no siempre se pierde hacia adelante. A veces se pierde hacia alguien.\n\nEmpezó un lunes de febrero, con el café todavía humeando en la taza y un niño de ocho años mirándome desde una silla diminuta con los ojos que eran los míos.` },
      { id: 'cap1', tag: 'Capítulo 1', title: 'Todavía no ha pasado', text: `Hay exactamente dos momentos en la vida de todo hombre en los que el tiempo se detiene de verdad: cuando alguien te dice que vas a ser padre y cuando te lo reclama un niño al que nunca has visto. A mí me tocaron los dos el mismo día. Y ninguno era posible.\n\nLunes · 08:15 h · Calle La Unión · Málaga · 2026\n\nEl silencio en mi apartamento de la calle La Unión no era simple vacío. Era una entidad viva, pesada como el plomo fundido, instalada en cada rincón con la persistencia de un invitado no deseado. Se acurrucaba junto a mí en el sofá de cuero desgastado por el tiempo y las ausencias. Reclamaba el lado izquierdo de la cama, el lugar abandonado por mi ex hacía ocho meses tras dieciséis años de vida compartida.\n\nNuestra historia empezó en aquella primavera de 2010. Entonces creíamos tenerlo todo por delante; no imaginábamos que lo mejor de nosotros se quedaría tirado en la cuneta. Ahora, ese mutismo se adhería a las paredes blancas del salón como una niebla espesa, impregnada del humo fantasma de cigarrillos ya apagados.\n\nEran las ocho y cuarto de un lunes gris de febrero. Al otro lado de la cristalera, Málaga se desperezaba bajo una luz pálida y cortante: un sol incapaz de calentar los huesos, pero clavado en la piel como la hoja de un cuchillo afilado.\n\nLa cafetera italiana, reliquia de mis días más optimistas, emitió su gorgoteo final. El café brotó negro como la brea. Espeso. Amargo. Sin azúcar. El combustible necesario.\n\nA mis pies, Noa —mi pequeña pomerania negra de ojos brillantes— soltó un bufido impaciente. Su urgencia canina me recordaba que aún había vida en este lugar. Ella también añoraba los desayunos de domingo: el aroma del pan tostado con tomate y aceite de oliva, el zumo de naranja recién exprimido inundando el aire de cítricos y las risas apagadas sin aviso, dejando ecos huecos.\n\nLe rasqué detrás de las orejas con dedos distraídos; me miró con esa paciencia infinita propia de los perros y los ancianos sabios. Entendía mi tormenta interna mejor que yo mismo.\n\nMe serví el café en la taza desconchada, la última superviviente de aquel juego barato comprado en IKEA en una tarde de ilusiones, cuando el amor parecía eterno. Me quedé mirando a través del muro de vidrio, observando el mundo como un espectador distante.\n\nAbajo, la calle iniciaba su ritual diario: persianas metálicas ascendiendo con estrépito oxidado, peatones apresurados hacia Juan XXIII con maletines y mochilas al hombro y algún repartidor en patinete eléctrico zigzagueando entre ellos. Yo, con treinta y siete años a mis espaldas, me sentía un actor secundario relegado a la última fila de su propia existencia.\n\nEl equipo de música, un Marantz de los setenta heredado de mi padre, custodiado como un relicario de polvo y memoria, bañaba el rincón con un resplandor ámbar. La aguja vibró en el surco final del vinilo y, de pronto, la guitarra de Triana rasgó la quietud del salón. Era Un nido en mi ventana.\n\nLa voz de Jesús de la Rosa empezó a elevarse, ese ruego hipnótico suplicando a una blanca paloma su vuelo, que no se perdiera en el vacío para no sucumbir al frío. Me quedé quieto mientras el café seguía sin tocar. Noa me observaba desde el suelo, inmóvil. La canción no tenía prisa por terminar y, por un momento, yo tampoco.\n\nMi ex siempre tachaba esta canción de ingenua. Nunca entendí por qué le gustaba tanto. Lo entiendo ahora.\n\nHerrmann Sole, mi tienda online de sneakers de edición limitada, funcionaba con precisión quirúrgica. Algoritmos, drops exclusivos, envíos internacionales sin retrasos. El dinero entraba sin esfuerzo. Podía permitirme el apartamento, las cervezas con la Guardia Pretoriana, los caprichos innecesarios vendidos por la sociedad como éxito. Por fuera, todo era impecable. Por dentro, el vacío absoluto.\n\nEl iPhone vibró sobre la encimera de granito, rompiendo el hechizo. El nombre en pantalla me sacó la primera sonrisa genuina en días: Toni.\n\n—¿Dime, piloto? —dije, intentando sonar casual.\n—¡Christian! ¿Qué pasa, fiera?` },
      { id: 'cap2', tag: 'Capítulo 2', title: 'La grieta', text: `Lunes · 10:55 h · Colegio García Lorca\n\nBajé las escaleras con el dibujo doblado en el bolsillo interior de la chaqueta de piel: una granada a punto de detonar. Cada crujido del papel contra el cuero era un recordatorio punzante: aquello no había salido de mi cabeza. Era real.\n\nEl niño —ese supuesto hijo mío, con mis ojos y mi remolino en el pelo— se había quedado dentro con la profesora. Su voz suave se filtraba a través de la puerta entreabierta mientras le hablaba bajito, calmándolo con la delicadeza de una madre.\n\nMe invadió una envidia sorda, un pinchazo en el pecho que me transportó a mis propios días de infancia: nadie me había secado las lágrimas con tanta ternura. Aprendí a tragármelas a solas, en el baño del instituto, mirando mi reflejo en el espejo empañado con la rabia suficiente para estallarlo.\n\nEl pasillo del García Lorca se abría ante mí como un túnel de hormigón. Fuera, en el patio, el griterío de los niños era un ruido lejano, un eco de juegos que yo ya no sabía descifrar. Mis sneakers golpeaban las baldosas desgastadas con un ritmo seco, rompiendo el silencio. Arriba, un fluorescente agonizante parpadeaba con un zumbido eléctrico, rindiéndose poco a poco.\n\nEstaba fuera de lugar. Todo me parecía irreal, como si hubiera irrumpido en una película independiente donde me habían asignado el papel principal sin guion, sin ensayos, sin advertencia alguna.` },
      { id: 'cap3', tag: 'Capítulo 3', title: 'El código', text: `Lunes · 18:30 h · Calle La Unión\n\nMe apoyé en la barandilla y dejé que el aire frío me golpeara la cara. El aislamiento del piso se me echaba encima como un bloque de hormigón. Tenía que hablar con alguien; no podía guardarme esto a solas.\n\nMarqué el número de mi madre. Vivía en Pedregalejo, en aquel piso con vistas al mar.\n\n—¿Christian? ¿Todo bien, hijo?\n—Hola, mamá… No, la verdad es que no. Ha pasado algo muy raro hoy. Fui al García Lorca tras un aviso del centro. Un niño de segundo de primaria… dice que soy su padre. Me abrazó, me llamó papá y conocía mi apodo, CC. Me enseñó un dibujo donde salgo yo y, en el reverso, la dirección de la calle Peregrino, 28.` },
      { id: 'cap4', tag: 'Capítulo 4', title: 'El pulso del pasado', text: `Lunes · 20:57 h · Calle La Unión\n\nEl tatuaje seguía picándome. Decidí llamar a Annette, mi tatuadora de Ikigaink Experience; la misma encargada de grabarlo años atrás. Contestó rápido.\n\n—Ven al estudio ahora mismo. No te entretengas. Aquí te espero.\n\nColgué y busqué el número de Álex.\n—Alexander, escucha: el brazo izquierdo brilla azul y Annette me espera. ¿Me acompañas?\n—Voy para allá.` },
      { id: 'cap5', tag: 'Capítulo 5', title: 'El puente al ayer', text: `Martes · 08:00 h · Calle La Unión\n\nEl martes amaneció con cielo eléctrico sobre Málaga, de esos grises que amenazan lluvia pero nunca cumplen. Puse la radio. Sonaba Sabina: Peces de ciudad. Abrí el armario con intención de ponerme lo de siempre, pero hoy algo me detuvo.\n\nAl fondo, colgada como reliquia sagrada, estaba la réplica exacta de la cazadora roja de cuero que llevaba James Dean en Rebel Without a Cause. Hoy tocaba rojo.` },
      { id: 'cap6', tag: 'Capítulo 6', title: 'En una hora', text: `Martes · 12:30 h · GOfit Huelin\n\nFui al GOfit Huelin. Me cambié en los vestuarios y me puse el bañador y una camiseta de fútbol. Nadar era mi meditación. Encadené largos hasta que José Ángel, el monitor, apareció en el borde de la piscina.\n\n—Vaya, Chris. Hoy vienes con ganas de ahogar las penas. Menuda camiseta, ¿es la de Alemania del 74?\n—Me gusta lo que tiene historia. Estas tienen alma.` }
